<!DOCTYPE html>
<html lang="en">
<head>
  <title>Quiet Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2f3437;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.04);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    .section {
      margin-bottom: 20px;
    }

    .question {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    label {
      display: block;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      cursor: pointer;
      background: #ffffff;
    }

    input[type="radio"] {
      margin-right: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 8px;
    }

    #chatBox {
      display: none;
    }

    #status {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    #partner {
      font-size: 13px;
      color: #374151;
      margin-bottom: 12px;
    }

    #chat {
      background: #ffffff;
      border: 1px solid #eeeeee;
      border-radius: 8px;
      padding: 10px;
      height: 220px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .line {
      margin-bottom: 8px;
      color: #444444;
    }

    .you {
      color: #111111;
    }

    textarea {
      width: 100%;
      resize: none;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: #9ca3af;
    }

    /* Assistant box */
    #assistantBox {
      margin-top: 20px;
      border-top: 1px solid #e5e7eb;
      padding-top: 14px;
    }

    #assistantReply {
      margin-top: 8px;
      font-size: 13px;
      color: #374151;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <h1>Quiet Connect</h1>
      <div class="subtitle">Take your time.</div>

      <!-- Preferences -->
      <div id="prefs">

        <div class="section">
          <div class="question">What brings you here right now?</div>
          <label><input type="radio" name="purpose" value="To share what’s on my mind">To share what’s on my mind</label>
          <label><input type="radio" name="purpose" value="To hear another perspective">To hear another perspective</label>
          <label><input type="radio" name="purpose" value="To understand something better">To understand something better</label>
          <label><input type="radio" name="purpose" value="Just to talk">Just to talk</label>
        </div>

        <div class="section">
          <div class="question">What kind of replies feel comfortable?</div>
          <label><input type="radio" name="reply" value="Long replies">Long replies</label>
          <label><input type="radio" name="reply" value="Short replies">Short replies</label>
          <label><input type="radio" name="reply" value="Either is fine">Either is fine</label>
        </div>

        <button onclick="start()">Continue</button>
        <div class="hint">No rush. You can pause anytime.</div>
      </div>

      <!-- Chat -->
      <div id="chatBox">
        <div id="status"></div>
        <div id="partner"></div>

        <div id="chat"></div>

        <textarea id="msg" rows="2" placeholder="Write when ready"
          onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();send();}">
        </textarea>

        <button onclick="send()">Send</button>
      </div>

      <!-- SYSTEM ASSISTANT (NEW) -->
      <div id="assistantBox">
        <div style="font-size:13px;color:#6b7280;margin-bottom:6px;">
          Quiet Assistant (optional)
        </div>

        <textarea id="assistantInput"
          rows="2"
          placeholder="Ask something while you wait..."></textarea>

        <button onclick="sendAssistant()">Ask</button>

        <div id="assistantReply"></div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;

    function start() {
      const purpose = document.querySelector('input[name="purpose"]:checked');
      const reply = document.querySelector('input[name="reply"]:checked');

      if (!purpose || !reply) {
        alert("Please choose both options");
        return;
      }

      document.getElementById("prefs").style.display = "none";
      document.getElementById("chatBox").style.display = "block";

      socket = io();

      socket.emit("prefs", {
        purpose: purpose.value,
        reply: reply.value
      });

      socket.on("status", text => {
        document.getElementById("status").innerText = text;
      });

      socket.on("partnerPrefs", p => {
        document.getElementById("partner").innerText =
          "About your partner: " + p.purpose + " · " + p.reply;
      });

      socket.on("message", msg => {
        addLine(msg, false);
      });
    }

    function send() {
      const input = document.getElementById("msg");
      if (!input.value.trim()) return;

      socket.emit("message", input.value);
      addLine(input.value, true);
      input.value = "";
    }

    function addLine(text, isYou) {
      const div = document.createElement("div");
      div.className = "line" + (isYou ? " you" : "");
      div.innerText = text;
      const chat = document.getElementById("chat");
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    /* =========================
       SYSTEM ASSISTANT LOGIC
       ========================= */
    async function sendAssistant() {
      const text = document.getElementById("assistantInput").value.trim();
      if (!text) return;

      const res = await fetch("/assistant-message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      document.getElementById("assistantReply").innerText =
        data.message || "No response";

      document.getElementById("assistantInput").value = "";
    }
  </script>
</body>
</html>
